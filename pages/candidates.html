<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Market Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:         #0d0f14;
    --surface:    #141820;
    --surface2:   #1a2030;
    --border:     #1e2530;
    --muted:      #3a4252;
    --text:       #e2e8f0;
    --dim:        #8896aa;
    --accent:     #4af0b0;
    --up:         #26d97f;
    --down:       #f04f5e;
    --sma10:      #facc15;
    --sma50:      #60a5fa;
    --sma250:     #f97316;
    --vol:        rgba(100,140,255,0.30);
    --vol-border: rgba(100,140,255,0.65);
    --r-card:     10px;
    --r-btn:      6px;
    --r-pill:     999px;
    --gap:        14px;
    font-size: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 200;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--accent);
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo span { color: var(--dim); font-weight: 400; }
  .logo:hover { opacity: .8; }

  /* ── NAV TABS ── */
  #nav-tabs { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
  .nav-tab {
    font-family: 'Inter', sans-serif;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--dim);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    padding: 4px 13px;
    transition: all .13s;
    white-space: nowrap;
    background: transparent;
  }
  .nav-tab:hover { color: var(--text); border-color: var(--muted); background: var(--surface2); }
  .nav-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  #meta-info {
    font-size: .7rem;
    font-weight: 400;
    color: var(--dim);
    white-space: nowrap;
  }
  .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  #watchlist-count {
    font-family: 'Space Mono', monospace;
    font-size: .65rem;
    color: var(--sma10);
    white-space: nowrap;
  }

  /* ── SEGMENTED CONTROLS (shared by all toggles) ── */
  .seg {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    overflow: hidden;
    padding: 2px;
    gap: 2px;
  }
  .seg-btn {
    font-family: 'Inter', sans-serif;
    font-size: .68rem;
    font-weight: 600;
    background: transparent;
    color: var(--dim);
    border: none;
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    transition: background .12s, color .12s;
    white-space: nowrap;
    letter-spacing: .02em;
  }
  .seg-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .seg-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,.04); }

  /* ── EXPORT ── */
  .btn-export {
    font-family: 'Inter', sans-serif;
    font-size: .68rem;
    font-weight: 600;
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(74,240,176,.4);
    border-radius: var(--r-btn);
    padding: 4px 11px;
    cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
    white-space: nowrap;
  }
  .btn-export:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 16px;
    padding: 7px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: .67rem;
    font-weight: 400;
    color: var(--dim);
  }
  .ls { width: 18px; height: 2px; border-radius: 1px; }
  .ls.up    { background: var(--up);   width: 7px; height: 7px; border-radius: 3px; }
  .ls.down  { background: var(--down); width: 7px; height: 7px; border-radius: 3px; }
  .ls.sma10  { background: var(--sma10);  }
  .ls.sma50  { background: var(--sma50);  }
  .ls.sma250 { background: var(--sma250); }
  .ls.vol    { background: var(--vol-border); }

  /* ── FILTER BAR ── */
  #filter-bar {
    display: none;
    gap: 6px;
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: .65rem;
    font-weight: 600;
    color: var(--dim);
    letter-spacing: .07em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .fdiv { width: 1px; height: 16px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
  .filter-btn {
    font-family: 'Inter', sans-serif;
    font-size: .67rem;
    font-weight: 500;
    background: var(--surface2);
    color: var(--dim);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    padding: 3px 10px;
    cursor: pointer;
    transition: all .13s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--muted); color: var(--text); background: var(--muted); }
  .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .filter-btn.wl-btn {
    border-color: rgba(250,204,21,.3);
    color: var(--sma10);
    background: rgba(250,204,21,.06);
  }
  .filter-btn.wl-btn.active { background: var(--sma10); border-color: var(--sma10); color: var(--bg); }
  #filter-count { font-size: .65rem; color: var(--dim); margin-left: auto; white-space: nowrap; }

  /* ── GRID ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
    padding: var(--gap) 16px 32px;
  }
  #grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  @media(max-width:1100px){ #grid:not(.cols-2){ grid-template-columns: repeat(3,1fr); } }
  @media(max-width:800px) { #grid{ grid-template-columns: repeat(2,1fr) !important; } }
  @media(max-width:520px) { #grid{ grid-template-columns: 1fr !important; } }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .card:hover {
    border-color: var(--muted);
    box-shadow: 0 4px 20px rgba(0,0,0,.35);
  }
  .card.in-watchlist { border-color: rgba(250,204,21,.28); }
  .card.in-watchlist:hover { border-color: var(--sma10); box-shadow: 0 4px 20px rgba(250,204,21,.08); }

  .card-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .card-row1 { display: flex; align-items: center; gap: 6px; }

  .ticker-symbol {
    font-family: 'Space Mono', monospace;
    font-size: .9rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: .03em;
    flex-shrink: 0;
  }
  .company-name {
    font-size: .7rem;
    font-weight: 400;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .last-price {
    font-family: 'Space Mono', monospace;
    font-size: .82rem;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .last-price.up   { color: var(--up); }
  .last-price.down { color: var(--down); }

  .btn-watch {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    color: var(--dim);
    font-family: 'Inter', sans-serif;
    font-size: .6rem;
    font-weight: 600;
    padding: 2px 8px;
    cursor: pointer;
    transition: all .13s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-watch:hover { border-color: var(--sma10); color: var(--sma10); background: rgba(250,204,21,.08); }
  .btn-watch.watched {
    background: rgba(250,204,21,.1);
    border-color: rgba(250,204,21,.5);
    color: var(--sma10);
  }

  .card-row2 { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    font-size: .6rem;
    font-weight: 500;
    background: var(--surface2);
    color: var(--dim);
    border-radius: var(--r-pill);
    padding: 2px 7px;
    white-space: nowrap;
    border: 1px solid transparent;
  }

  .chart-wrap {
    position: relative;
    flex: 1;
    padding: 4px 4px 0;
    background: var(--surface);
  }
  canvas { display: block; width: 100% !important; border-radius: 4px; overflow: hidden; }

  .empty-state {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-size: .78rem;
    grid-column: 1 / -1;
  }

  /* ── STATUS ── */
  #status {
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
    font-size: .8rem;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(5,7,11,0.88);
    backdrop-filter: blur(6px);
    padding: 20px;
    flex-direction: column;
  }
  #lightbox.open { display: flex; }
  #lb-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--r-card) var(--r-card) 0 0;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #lb-ticker { font-family: 'Space Mono', monospace; font-size: 1.05rem; font-weight: 700; color: var(--accent); letter-spacing: .05em; }
  #lb-name   { font-size: .78rem; font-weight: 400; color: var(--dim); flex: 1; }
  #lb-price  { font-family: 'Space Mono', monospace; font-size: .96rem; font-weight: 700; }
  #lb-price.up { color: var(--up); } #lb-price.down { color: var(--down); }
  #lb-tags   { display: flex; gap: 5px; }
  #lb-hint   { font-size: .62rem; color: var(--muted); }
  #lb-close  {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    color: var(--dim);
    font-family: 'Inter', sans-serif;
    font-size: .68rem;
    font-weight: 500;
    padding: 4px 11px;
    cursor: pointer;
    transition: all .12s;
    flex-shrink: 0;
  }
  #lb-close:hover { border-color: var(--muted); color: var(--text); background: var(--muted); }
  #lb-canvas-wrap {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 0 var(--r-card) var(--r-card);
    overflow: hidden;
    min-height: 0;
    padding: 6px;
  }
  #lb-canvas { display: block; width: 100% !important; height: 100% !important; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="../index.html">MARKET<span>/</span>GRID</a>
  <div id="nav-tabs"><!-- injected by JS --></div>
  <div id="meta-info">—</div>
  <div class="header-actions">
    <div class="seg">
      <button class="seg-btn active" data-interval="daily">Daily</button>
      <button class="seg-btn"        data-interval="weekly">Weekly</button>
    </div>
    <div class="seg">
      <button class="seg-btn col-btn active" data-cols="4">4</button>
      <button class="seg-btn col-btn"        data-cols="2">2</button>
    </div>
    <div class="seg">
      <button class="seg-btn sort-btn active" data-sort="default">Default</button>
      <button class="seg-btn sort-btn"        data-sort="sector">Sector</button>
    </div>
    <span id="watchlist-count"></span>
    <button class="btn-export" id="btn-export">⬇ Export</button>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="ls up"></div> Up</div>
  <div class="legend-item"><div class="ls down"></div> Down</div>
  <div class="legend-item"><div class="ls sma10"></div> SMA 10</div>
  <div class="legend-item"><div class="ls sma50"></div> SMA 50</div>
  <div class="legend-item"><div class="ls sma250"></div> SMA 250</div>
  <div class="legend-item"><div class="ls" style="background:#a78bfa"></div> Price−SMA50</div>
</div>

<div id="filter-bar">
  <span class="filter-label">Sectors</span>
  <button class="filter-btn active" data-sector="__all__">All</button>
  <span class="fdiv" id="fdiv-start"></span>
  <span class="fdiv" id="fdiv-end"></span>
  <button class="filter-btn wl-btn" data-sector="__watchlist__">★ Watchlist</button>
  <span id="filter-count"></span>
</div>

<div id="status"><span class="spinner"></span> Loading…</div>
<div id="grid" style="display:none">
  <div class="empty-state" id="empty-state">No stocks match the current filter.</div>
</div>

<div id="lightbox">
  <div id="lb-header">
    <span id="lb-ticker"></span>
    <span id="lb-name"></span>
    <span id="lb-price"></span>
    <div id="lb-tags"></div>
    <span id="lb-hint">Drag to zoom · ESC to reset zoom · ESC again to close</span>
    <button id="lb-close">✕ Close</button>
  </div>
  <div id="lb-canvas-wrap">
    <canvas id="lb-canvas"></canvas>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// GRID NAME — derived from the HTML filename
// e.g. pages/sp500.html → "sp500"
// ─────────────────────────────────────────────
const GRID_NAME = location.pathname.split('/').pop().replace('.html','');
const DATA_PATH = '../data/';
const CHART_H   = 280;
const PAD       = { top:12, right:22, bottom:18, left:62 };
const TICK_W    = 3;
const LS_KEY    = 'marketgrid_watchlist_v1';

let currentInterval = 'daily';

const C = {
  bg:'#141820', plotBg:'rgb(36,44,53)', grid:'rgba(255,255,255,0.07)', text:'#8896aa',
  up:'#26d97f', down:'#f04f5e',
  sma10:'#facc15', sma50:'#60a5fa', sma250:'#f97316',
};

// ─────────────────────────────────────────────
// WATCHLIST (shared across all grids)
// ─────────────────────────────────────────────
function loadWatchlist() {
  try { return new Set(JSON.parse(localStorage.getItem(LS_KEY)) || []); }
  catch { return new Set(); }
}
function saveWatchlist(s) { localStorage.setItem(LS_KEY, JSON.stringify([...s])); }
let watchlist = loadWatchlist();

function toggleWatch(ticker, e) {
  if (e) e.stopPropagation();
  watchlist.has(ticker) ? watchlist.delete(ticker) : watchlist.add(ticker);
  saveWatchlist(watchlist);
  refreshWatchlistUI();
  applyFilter();
}

function refreshWatchlistUI() {
  const n = watchlist.size;
  document.getElementById('watchlist-count').textContent = n > 0 ? `★ ${n}` : '';
  document.querySelectorAll('.card[data-ticker]').forEach(card => {
    const t = card.dataset.ticker, w = watchlist.has(t);
    const btn = card.querySelector('.btn-watch');
    btn.textContent = w ? '★' : '+';
    btn.title = w ? 'Remove from watchlist' : 'Add to watchlist';
    btn.classList.toggle('watched', w);
    card.classList.toggle('in-watchlist', w);
  });
}

// ─────────────────────────────────────────────
// EXPORT
// ─────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  if (!watchlist.size) { alert('Watchlist is empty.'); return; }
  const a = Object.assign(document.createElement('a'), {
    href:     URL.createObjectURL(new Blob([[...watchlist].sort().join('\n')+'\n'],{type:'text/plain'})),
    download: 'watchlist.txt',
  });
  a.click(); URL.revokeObjectURL(a.href);
});

// ─────────────────────────────────────────────
// COLUMN TOGGLE
// ─────────────────────────────────────────────
document.querySelectorAll('.col-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.col-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');    const grid = document.getElementById('grid');
    btn.dataset.cols === '2' ? grid.classList.add('cols-2') : grid.classList.remove('cols-2');
    requestAnimationFrame(() => {
      document.querySelectorAll('.card canvas').forEach(c => {
        if (c._ohlcv) drawChart(c, c._ohlcv, CHART_H);
      });
    });
  });
});

// ─────────────────────────────────────────────
// INTERVAL TOGGLE (Daily / Weekly)
// ─────────────────────────────────────────────
document.querySelectorAll('.seg-btn[data-interval]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.interval === currentInterval) return;
    document.querySelectorAll('.seg-btn[data-interval]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentInterval = btn.dataset.interval;
    reloadAllCards();
  });
});

async function reloadAllCards() {
  const cards = [...document.querySelectorAll('.card[data-ticker]')];
  await Promise.all(cards.map(async card => {
    const ticker = card.dataset.ticker;
    const canvas = card.querySelector('canvas');
    if (!canvas) return;
    try {
      const data = await fetchJSON(DATA_PATH + ticker + `_${currentInterval}.json`);
      canvas._ohlcv = data.ohlcv;
      canvas._H     = CHART_H;
      drawChart(canvas, data.ohlcv, CHART_H);
    } catch(e) {
      console.warn(`Could not load ${currentInterval} data for ${ticker}:`, e);
    }
  }));
}

// ─────────────────────────────────────────────
// SORT
// ─────────────────────────────────────────────
let currentSort = 'default';

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    sortCards();
  });
});

function sortCards() {
  const grid    = document.getElementById('grid');
  const emptyEl = document.getElementById('empty-state');
  const cards   = [...grid.querySelectorAll('.card[data-ticker]')];

  if (currentSort === 'sector') {
    cards.sort((a, b) => {
      const sA = (a.dataset.sector   || '').toLowerCase();
      const sB = (b.dataset.sector   || '').toLowerCase();
      const iA = (a.dataset.industry || '').toLowerCase();
      const iB = (b.dataset.industry || '').toLowerCase();
      if (sA !== sB) return sA < sB ? -1 : 1;
      return iA < iB ? -1 : iA > iB ? 1 : 0;
    });
  } else {
    // Default: restore original load order via data-index
    cards.sort((a, b) => parseInt(a.dataset.index) - parseInt(b.dataset.index));
  }

  // Re-insert in sorted order (before empty-state sentinel)
  cards.forEach(card => grid.insertBefore(card, emptyEl));

  // Redraw canvases (layout may have shifted)
  requestAnimationFrame(() => {
    cards.forEach(card => {
      const c = card.querySelector('canvas');
      if (c && c._ohlcv) drawChart(c, c._ohlcv, CHART_H);
    });
  });
}

// ─────────────────────────────────────────────
// SECTOR FILTER
// ─────────────────────────────────────────────
let activeSectors = new Set(['__all__']);

function buildSectorButtons(datasets) {
  const sectors = [...new Set(
    datasets.filter(Boolean).map(d => d.info.sector || '—')
  )].sort();

  const bar  = document.getElementById('filter-bar');
  const end  = document.getElementById('fdiv-end');
  sectors.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.sector = s;
    btn.textContent = s;
    bar.insertBefore(btn, end);
  });
  bar.style.display = 'flex';

  bar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const s = btn.dataset.sector;
    if (s === '__all__') {
      activeSectors = new Set(['__all__']);
    } else if (s === '__watchlist__') {
      activeSectors = activeSectors.has('__watchlist__')
        ? new Set(['__all__']) : new Set(['__watchlist__']);
    } else {
      activeSectors.delete('__all__'); activeSectors.delete('__watchlist__');
      activeSectors.has(s) ? activeSectors.delete(s) : activeSectors.add(s);
      if (!activeSectors.size) activeSectors = new Set(['__all__']);
    }
    bar.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', activeSectors.has(b.dataset.sector))
    );
    applyFilter();
  });
}

function applyFilter() {
  const cards = [...document.querySelectorAll('.card[data-ticker]')];
  let visible = 0;
  cards.forEach(card => {
    const show = activeSectors.has('__all__')       ? true
               : activeSectors.has('__watchlist__') ? watchlist.has(card.dataset.ticker)
               : activeSectors.has(card.dataset.sector);
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('filter-count').textContent =
    activeSectors.has('__all__') ? `${cards.length} stocks` : `${visible} of ${cards.length} stocks`;
  document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
}

// ─────────────────────────────────────────────
// FETCH + BOOTSTRAP
// ─────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url + '?_=' + Date.now());
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
  return r.json();
}

async function main() {
  const status = document.getElementById('status');
  const grid   = document.getElementById('grid');

  // Set page title
  document.title = `Market Grid — ${GRID_NAME.toUpperCase()}`;

  try {
    // Load nav grids
    const gridsIndex = await fetchJSON(DATA_PATH + 'grids.json').catch(() => ({ grids: [GRID_NAME] }));
    buildNavTabs(gridsIndex.grids);

    // Load this grid's manifest
    const manifest = await fetchJSON(DATA_PATH + `manifest_${GRID_NAME}.json`);
    const tickers  = manifest.tickers || [];
    const updated  = manifest.generated ? new Date(manifest.generated).toLocaleString() : '—';
    document.getElementById('meta-info').textContent = `${tickers.length} tickers · ${updated}`;

    status.innerHTML = `<span class="spinner"></span> Loading ${tickers.length} tickers…`;

    // Load ticker data (shared pool)
    const datasets = await Promise.all(
      tickers.map(t =>
        fetchJSON(DATA_PATH + t + '_daily.json').catch(e => { console.warn(`Skip ${t}:`, e); return null; })
      )
    );

    status.style.display = 'none';
    grid.style.display   = 'grid';

    buildSectorButtons(datasets);

    const emptyEl = document.getElementById('empty-state');
    datasets.forEach((data, idx) => {
      if (data) grid.insertBefore(buildCard(data, idx), emptyEl);
    });

    refreshWatchlistUI();
    applyFilter();

  } catch(e) {
    status.innerHTML = `⚠ ${e.message}<br><small>Run <code>python download_data.py</code> first.</small>`;
  }
}

function buildNavTabs(grids) {
  const nav = document.getElementById('nav-tabs');
  grids.forEach(name => {
    const a = document.createElement('a');
    a.className = 'nav-tab' + (name === GRID_NAME ? ' active' : '');
    a.href      = `${name}.html`;
    a.textContent = name.toUpperCase();
    nav.appendChild(a);
  });
}

// ─────────────────────────────────────────────
// BUILD CARD
// ─────────────────────────────────────────────
function buildCard(data, idx) {
  const { ticker, info, ohlcv } = data;
  const last = ohlcv[ohlcv.length-1], prev = ohlcv[ohlcv.length-2]||last;
  const isUp = last.c >= prev.c, sector = info.sector || '—', w = watchlist.has(ticker);

  const card = document.createElement('div');
  card.className = 'card' + (w ? ' in-watchlist' : '');
  card.dataset.ticker   = ticker;
  card.dataset.sector   = sector;
  card.dataset.industry = info.industry || '—';
  card.dataset.index    = idx;
  card.addEventListener('click', () => openLightbox(data));

  const hdr  = document.createElement('div'); hdr.className = 'card-header';
  const row1 = document.createElement('div'); row1.className = 'card-row1';
  row1.innerHTML = `
    <span class="ticker-symbol">${ticker}</span>
    <span class="company-name">${esc(info.shortName)}</span>
    <span class="last-price ${isUp?'up':'down'}">${last.c.toFixed(2)}</span>
    <button class="btn-watch ${w?'watched':''}" title="${w?'Remove from watchlist':'Add to watchlist'}"
            data-ticker="${ticker}">${w?'★':'+'}</button>`;
  row1.querySelector('.btn-watch').addEventListener('click', e => toggleWatch(ticker, e));

  const row2 = document.createElement('div'); row2.className = 'card-row2';
  if (info.sector)   row2.innerHTML += `<span class="tag">${esc(info.sector)}</span>`;
  if (info.industry) row2.innerHTML += `<span class="tag">${esc(info.industry)}</span>`;

  hdr.appendChild(row1); hdr.appendChild(row2); card.appendChild(hdr);

  const wrap = document.createElement('div'); wrap.className = 'chart-wrap';
  const canvas = document.createElement('canvas');
  canvas.height = CHART_H;
  canvas._ohlcv = ohlcv;
  canvas._H     = CHART_H;
  wrap.appendChild(canvas); card.appendChild(wrap);

  requestAnimationFrame(() => { drawChart(canvas, ohlcv, CHART_H); attachCrosshair(canvas); });
  return card;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────
// CHART LAYOUT CONSTANTS
// ─────────────────────────────────────────────
// Pane heights as fractions of total H
const PANE_PRICE = 0.58;   // OHLC + SMAs
const PANE_VOL   = 0.16;   // Volume
const PANE_IND   = 0.16;   // Price−SMA50 indicator
const PANE_DATE  = 0.10;   // Date axis

// ─────────────────────────────────────────────
// NICE NUMBER HELPER
// ─────────────────────────────────────────────
function niceStep(range, targetTicks) {
  const rough = range / targetTicks;
  const mag   = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm  = rough / mag;
  let nice    = norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10;
  return nice * mag;
}

function niceTicks(lo, hi, targetTicks) {
  const step  = niceStep(hi - lo, targetTicks);
  const start = Math.ceil(lo / step) * step;
  const ticks = [];
  for (let v = start; v <= hi + step * 0.001; v = Math.round((v + step) * 1e8) / 1e8) {
    if (v >= lo && v <= hi) ticks.push(v);
  }
  return ticks;
}

// ─────────────────────────────────────────────
// DATE AXIS HELPERS
// ─────────────────────────────────────────────
function pickDateTicks(ohlcv, maxTicks) {
  const n = ohlcv.length;
  const ticks = [];
  let lastYear = null, lastMonth = null;

  for (let i = 0; i < n; i++) {
    const d = new Date(ohlcv[i].t + 'T00:00:00');
    const y = d.getFullYear(), m = d.getMonth();
    if (n > 200) {
      // Monthly or quarterly labels for long series
      const interval = n > 600 ? 3 : 1;
      if (m !== lastMonth && m % interval === 0) {
        ticks.push({ i, d, label: m === 0 ? String(y) : d.toLocaleString('en',{month:'short'}) });
        lastMonth = m;
      }
    } else {
      // Weekly series — monthly labels
      if (m !== lastMonth) {
        ticks.push({ i, d, label: m === 0 ? String(y) : d.toLocaleString('en',{month:'short'}) });
        lastMonth = m;
      }
    }
  }
  // Thin out if too many
  while (ticks.length > maxTicks) {
    ticks.splice(0, ticks.length, ...ticks.filter((_,i)=> i % 2 === 0));
  }
  return ticks;
}

// ─────────────────────────────────────────────
// CORE CHART RENDERER
// ─────────────────────────────────────────────
function drawChart(canvas, ohlcv, H, zoomRange) {
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth;
  if (!W || !H || !ohlcv || !ohlcv.length) return;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Apply zoom slice
  const data  = zoomRange
    ? ohlcv.slice(zoomRange[0], zoomRange[1] + 1)
    : ohlcv;
  const n = data.length;
  if (!n) return;

  // Pane geometry
  const pH  = Math.floor(H * PANE_PRICE);
  const vH  = Math.floor(H * PANE_VOL);
  const iH  = Math.floor(H * PANE_IND);
  const dH  = H - pH - vH - iH;   // date axis

  const priceY   = PAD.top;
  const priceBot = priceY + pH - PAD.bottom;
  const volY     = priceY + pH;
  const volBot   = volY + vH - 4;
  const indY     = volY + vH;
  const indBot   = indY + iH - 4;
  const dateY    = indY + iH;

  const innerW = W - PAD.left - PAD.right;
  const slotW  = innerW / n;

  // Price range
  let pmin = Infinity, pmax = -Infinity;
  data.forEach(r => {
    pmin = Math.min(pmin, r.l); pmax = Math.max(pmax, r.h);
    [r.sma10, r.sma50, r.sma250].forEach(v => { if (v != null) { pmin = Math.min(pmin,v); pmax = Math.max(pmax,v); }});
  });
  const ppad  = (pmax - pmin || 1) * 0.04;
  const plo   = pmin - ppad, phi = pmax + ppad, pspan = phi - plo;

  // Volume range
  const volMax = Math.max(...data.map(r => r.v)) || 1;

  // Indicator (price − sma50)
  const indVals = data.map(r => (r.sma50 != null) ? r.c - r.sma50 : null);
  const indNonNull = indVals.filter(v => v != null);
  const indAbs = indNonNull.length ? Math.max(...indNonNull.map(Math.abs)) * 1.15 : 1;
  const ilo = -indAbs, ihi = indAbs;

  // Coordinate helpers
  const px  = i  => PAD.left + (i + 0.5) * slotW;
  const py  = v  => priceY + (priceBot - priceY) * (1 - (v - plo) / pspan);
  const vy  = v  => volY   + (volBot  - volY)  * (1 - v / volMax);
  const iy  = v  => indY   + (indBot  - indY)  * (1 - (v - ilo) / (ihi - ilo));

  // ── Background ──
  ctx.fillStyle = C.plotBg;
  ctx.fillRect(PAD.left, priceY, innerW, priceBot - priceY);
  ctx.fillRect(PAD.left, volY,   innerW, volBot   - volY);
  ctx.fillRect(PAD.left, indY,   innerW, indBot   - indY);
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, PAD.left, H);
  ctx.fillRect(W - PAD.right, 0, PAD.right, H);
  ctx.fillRect(0, dateY, W, dH + PAD.bottom);

  // ── Price grid + nice Y labels ──
  const pTicks = niceTicks(plo, phi, 5);
  ctx.lineWidth = 1;
  pTicks.forEach(v => {
    const y = py(v);
    ctx.strokeStyle = C.grid; ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.fillStyle = C.text; ctx.font = `10px 'Space Mono',monospace`; ctx.textAlign = 'right';
    const label = v >= 1000 ? v.toFixed(0) : v >= 100 ? v.toFixed(1) : v.toFixed(2);
    ctx.fillText(label, PAD.left - 4, y + 3);
  });

  // Current price line
  const lastClose = data[n-1].c;
  const lastY = py(lastClose);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.moveTo(PAD.left, lastY); ctx.lineTo(W - PAD.right, lastY); ctx.stroke();
  ctx.setLineDash([]);
  // Price label on right edge
  const isLastUp = data[n-1].c >= (data[n-2]||data[n-1]).c;
  ctx.fillStyle = isLastUp ? C.up : C.down;
  ctx.font = `9px 'Space Mono',monospace`; ctx.textAlign = 'left';
  ctx.fillText(lastClose.toFixed(lastClose >= 100 ? 1 : 2), W - PAD.right + 2, lastY + 3);

  // ── Volume bars (colored) ──
  for (let i = 0; i < n; i++) {
    const r = data[i], x = px(i), bw = Math.max(1, slotW * 0.6);
    const isUp = r.c >= r.o;
    ctx.fillStyle = isUp ? 'rgba(38,217,127,0.35)' : 'rgba(240,79,94,0.35)';
    ctx.fillRect(x - bw/2, vy(r.v), bw, volBot - vy(r.v));
  }

  // ── SMAs ──
  const drawSMA = (key, color) => {
    ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.beginPath();
    let go = false;
    for (let i = 0; i < n; i++) {
      const v = data[i][key]; if (v == null) continue;
      go ? ctx.lineTo(px(i), py(v)) : (ctx.moveTo(px(i), py(v)), go = true);
    }
    ctx.stroke();
  };
  drawSMA('sma250', C.sma250); drawSMA('sma50', C.sma50); drawSMA('sma10', C.sma10);

  // ── OHLC bars ──
  const tw = Math.min(TICK_W, Math.max(1, slotW * 0.35));
  ctx.lineWidth = 1;
  for (let i = 0; i < n; i++) {
    const r = data[i], x = px(i);
    ctx.strokeStyle = r.c >= r.o ? C.up : C.down;
    ctx.beginPath();
    ctx.moveTo(x, py(r.h)); ctx.lineTo(x, py(r.l));
    ctx.moveTo(x - tw, py(r.o)); ctx.lineTo(x, py(r.o));
    ctx.moveTo(x, py(r.c)); ctx.lineTo(x + tw, py(r.c));
    ctx.stroke();
  }

  // ── Pane dividers ──
  ctx.strokeStyle = C.grid; ctx.lineWidth = 1;
  [volY, indY].forEach(y => {
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
  });

  // ── Indicator: price − SMA50 ──
  // Zero line
  const zeroY = iy(0);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD.left, zeroY); ctx.lineTo(W - PAD.right, zeroY); ctx.stroke();

  // Indicator line
  ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 1.3; ctx.beginPath();
  let indGo = false;
  for (let i = 0; i < n; i++) {
    const v = indVals[i]; if (v == null) { indGo = false; continue; }
    const y = iy(v);
    indGo ? ctx.lineTo(px(i), y) : (ctx.moveTo(px(i), y), indGo = true);
  }
  ctx.stroke();

  // Indicator label
  ctx.fillStyle = C.text; ctx.font = `9px 'Space Mono',monospace`; ctx.textAlign = 'right';
  ctx.fillText('P−50', PAD.left - 4, indY + 10);

  // ── Date axis ──
  const maxDateTicks = Math.floor(innerW / 45);
  const dateTicks = pickDateTicks(data, maxDateTicks);
  ctx.fillStyle = C.text; ctx.font = `9px 'Inter',sans-serif`; ctx.textAlign = 'center';
  dateTicks.forEach(({ i, label }) => {
    const x = px(i);
    // Tick mark
    ctx.strokeStyle = C.grid; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, dateY); ctx.lineTo(x, dateY + 3); ctx.stroke();
    // Label
    ctx.fillStyle = C.text;
    ctx.fillText(label, x, dateY + 12);
  });

  // Store geometry on canvas for crosshair/zoom use
  canvas._chartMeta = { data, n, slotW, px, py, priceY, priceBot, volY, indY, indBot, dateY, innerW };
}

// ─────────────────────────────────────────────
// CROSSHAIR (card canvases only)
// ─────────────────────────────────────────────
function attachCrosshair(canvas) {
  canvas.addEventListener('mousemove', e => {
    const meta = canvas._chartMeta;
    if (!meta) return;
    const rect = canvas.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;
    // Only show crosshair in chart area (above date axis)
    if (mx < PAD.left || mx > rect.width - PAD.right) return;
    if (my > meta.dateY) return;

    const i = Math.round((mx - PAD.left) / meta.slotW - 0.5);
    if (i < 0 || i >= meta.n) return;
    const bar = meta.data[i];
    const x   = meta.px(i);

    // Redraw chart, then overlay crosshair
    drawChart(canvas, canvas._ohlcv, canvas._H || parseInt(canvas.height / (window.devicePixelRatio||1)), canvas._zoomRange);

    const dpr = window.devicePixelRatio || 1;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Vertical line
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x, meta.priceY); ctx.lineTo(x, meta.dateY); ctx.stroke();
    ctx.setLineDash([]);

    // Tooltip
    const label = `${bar.t}  ${bar.c.toFixed(bar.c >= 100 ? 2 : 3)}`;
    ctx.font = `10px 'Space Mono',monospace`;
    const tw2 = ctx.measureText(label).width + 10;
    const tx  = Math.min(x + 6, rect.width - PAD.right - tw2);
    const ty  = meta.priceY + 10;
    ctx.fillStyle = 'rgba(20,24,32,0.88)';
    ctx.fillRect(tx - 2, ty - 11, tw2 + 4, 16);
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(label, tx + 3, ty);
  });

  canvas.addEventListener('mouseleave', () => {
    drawChart(canvas, canvas._ohlcv, canvas._H || parseInt(canvas.height / (window.devicePixelRatio||1)), canvas._zoomRange);
  });
}

// ─────────────────────────────────────────────
// LIGHTBOX ZOOM (drag-to-select range)
// ─────────────────────────────────────────────
let lbZoom      = null;   // [startIdx, endIdx] or null
let lbDragStart = null;   // canvas x when drag started

function attachLightboxZoom(canvas) {
  let dragging = false;
  let startX   = null;
  let overlayX = null;

  function canvasX(e) {
    return e.clientX - canvas.getBoundingClientRect().left;
  }

  canvas.addEventListener('mousedown', e => {
    const meta = canvas._chartMeta;
    if (!meta || e.button !== 0) return;
    const cx = canvasX(e);
    if (cx < PAD.left || cx > canvas.getBoundingClientRect().width - PAD.right) return;
    dragging = true;
    startX   = cx;
    overlayX = cx;
    canvas.style.cursor = 'col-resize';
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    overlayX = canvasX(e);
    const meta = canvas._chartMeta;
    if (!meta) return;

    // Redraw with drag overlay
    const H = canvas._H || parseInt(canvas.height / (window.devicePixelRatio||1));
    drawChart(canvas, canvas._ohlcv, H, lbZoom);

    const dpr = window.devicePixelRatio || 1;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const x1 = Math.min(startX, overlayX);
    const x2 = Math.max(startX, overlayX);
    ctx.fillStyle = 'rgba(167,139,250,0.12)';
    ctx.fillRect(x1, meta.priceY, x2 - x1, meta.dateY - meta.priceY);
    ctx.strokeStyle = 'rgba(167,139,250,0.6)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x1, meta.priceY); ctx.lineTo(x1, meta.dateY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x2, meta.priceY); ctx.lineTo(x2, meta.dateY); ctx.stroke();
  });

  window.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    canvas.style.cursor = '';
    const meta = canvas._chartMeta;
    if (!meta) return;
    const x1 = Math.min(startX, canvasX(e));
    const x2 = Math.max(startX, canvasX(e));
    if (x2 - x1 < 8) return; // too small — ignore

    // Convert pixel range to data indices
    const fullData = canvas._ohlcv;
    const baseStart = lbZoom ? lbZoom[0] : 0;
    let i1 = Math.max(0, Math.floor((x1 - PAD.left) / meta.slotW));
    let i2 = Math.min(meta.n - 1, Math.ceil((x2 - PAD.left) / meta.slotW));
    if (i2 <= i1) return;

    lbZoom = [baseStart + i1, baseStart + i2];
    const H = canvas._H || parseInt(canvas.height / (window.devicePixelRatio||1));
    drawChart(canvas, fullData, H, lbZoom);
    canvas._zoomRange = lbZoom;
  });

  // Reset zoom: click on chart (no drag), or ESC
  canvas.addEventListener('click', e => {
    if (Math.abs(canvasX(e) - startX) > 4) return; // was a drag
    if (!lbZoom) return;
    lbZoom = null;
    canvas._zoomRange = null;
    const H = canvas._H || parseInt(canvas.height / (window.devicePixelRatio||1));
    drawChart(canvas, canvas._ohlcv, H, null);
  });
}

// ─────────────────────────────────────────────
// LIGHTBOX
// ─────────────────────────────────────────────
const lb       = document.getElementById('lightbox');
const lbCanvas = document.getElementById('lb-canvas');
let   lbData   = null;

// Attach zoom once
attachLightboxZoom(lbCanvas);

function openLightbox(data) {
  lbData  = data;
  lbZoom  = null;
  lbCanvas._zoomRange = null;
  const { ticker, info, ohlcv } = data;
  const last = ohlcv[ohlcv.length-1], prev = ohlcv[ohlcv.length-2]||last;
  const isUp = last.c >= prev.c;
  document.getElementById('lb-ticker').textContent = ticker;
  document.getElementById('lb-name').textContent   = info.shortName || '';
  const pe = document.getElementById('lb-price');
  pe.textContent = last.c.toFixed(2); pe.className = isUp ? 'up' : 'down';
  const te = document.getElementById('lb-tags'); te.innerHTML = '';
  if (info.sector)   te.innerHTML += `<span class="tag">${esc(info.sector)}</span>`;
  if (info.industry) te.innerHTML += `<span class="tag">${esc(info.industry)}</span>`;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(() => {
    const wrap = document.getElementById('lb-canvas-wrap');
    const H    = wrap.clientHeight;
    lbCanvas._ohlcv = ohlcv;
    lbCanvas._H     = H;
    drawChart(lbCanvas, ohlcv, H, null);
  });
}

function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
  lbData = null; lbZoom = null;
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (lbZoom) {
      // First ESC resets zoom
      lbZoom = null; lbCanvas._zoomRange = null;
      const H = lbCanvas._H || parseInt(lbCanvas.height / (window.devicePixelRatio||1));
      drawChart(lbCanvas, lbData.ohlcv, H, null);
    } else {
      closeLightbox();
    }
  }
});
window.addEventListener('resize', () => {
  if (!lbData) return;
  const wrap = document.getElementById('lb-canvas-wrap');
  const H    = wrap.clientHeight;
  lbCanvas._H = H;
  drawChart(lbCanvas, lbData.ohlcv, H, lbZoom);
});

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    document.querySelectorAll('.card canvas').forEach(c => {
      if (c._ohlcv) drawChart(c, c._ohlcv, CHART_H);
    });
  }, 150);
});

main();
</script>
